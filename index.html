<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Slate — Blank Project</title>
    <meta name="description" content="A clean, premium starting point for your web application.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient background blobs -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Top navigation bar -->
    <nav id="navbar">
        <div class="nav-left">
            <div class="logo" id="nav-logo-home" style="cursor:pointer;">
                <span class="logo-icon">🚀</span>
                <span class="logo-text">CleanApp</span>
            </div>
        </div>
        <div class="nav-center">
            <button class="nav-tab active" data-view="home" id="nav-home">
                <span class="tab-icon">🏠</span> Home
            </button>
        </div>
        <div class="nav-right">
            <button class="icon-btn" id="theme-toggle" title="Toggle theme">🌙</button>
        </div>
    </nav>

    <!-- Main content area -->
    <main id="app">
        <!-- Home View -->
        <section id="view-home" class="view active">
            <div class="welcome-container">
                <h1 class="section-title">Clean Slate</h1>
                <p class="section-subtitle">Your beautiful, empty application is ready for new content.</p>
                
                <div class="placeholder-card">
                    <div class="topic-icon">✨</div>
                    <h3>Ready to build</h3>
                    <p>The code is stripped of all previous question and login data. You can now implement your own logic and UI components.</p>
                </div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
